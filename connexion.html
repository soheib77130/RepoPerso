<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Freelinko — Connexion</title>
  <meta name="description" content="Connexion Freelinko — client ou independant." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="site-theme.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#050a14;--surface:#0a1122;--surface2:#0f1730;
      --border:rgba(255,255,255,.06);--border-hover:rgba(255,255,255,.12);
      --text:#cdd5e0;--text-secondary:#7a8599;--white:#f0f4ff;
      --blue:#3b82f6;--blue-soft:rgba(59,130,246,.12);--blue-glow:rgba(59,130,246,.25);
      --green:#22c55e;--green-soft:rgba(34,197,94,.12);--green-glow:rgba(34,197,94,.25);
      --radius:16px;--radius-lg:24px;--radius-xl:32px;
      --ease:cubic-bezier(.22,1,.36,1);
      --font:'Inter',system-ui,-apple-system,sans-serif;
      --font-display:'Space Grotesk','Inter',sans-serif;
    }
    html{scroll-behavior:smooth;overflow-x:hidden}
    body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    a{color:inherit;text-decoration:none}
    button{font-family:inherit;cursor:pointer}
    ::selection{background:rgba(59,130,246,.25);color:var(--white)}

    /* Ambient */
    .grain{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E") repeat}
    .glow-orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(120px);z-index:0}
    .glow-orb.blue{width:500px;height:500px;top:-10%;left:10%;background:rgba(59,130,246,.12)}
    .glow-orb.green{width:400px;height:400px;bottom:-5%;right:10%;background:rgba(34,197,94,.1)}

    /* Nav */
    .nav{max-width:900px;width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:32px;position:relative;z-index:2}
    .brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--white);letter-spacing:-.3px}
    .logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--green));display:grid;place-items:center;box-shadow:0 0 24px var(--blue-glow);transition:transform .3s var(--ease)}
    .logo-mark:hover{transform:scale(1.1) rotate(-3deg)}
    .nav-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 20px;border-radius:10px;font-size:14px;font-weight:700;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);transition:all .25s var(--ease)}
    .nav-btn:hover{border-color:var(--border-hover);background:rgba(255,255,255,.07);transform:translateY(-1px)}

    /* Card */
    .card{max-width:520px;width:100%;position:relative;z-index:2;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-xl);padding:40px;overflow:hidden;box-shadow:0 0 80px rgba(59,130,246,.04),0 40px 80px rgba(0,0,0,.35);animation:cardIn .6s var(--ease) both}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.5),rgba(34,197,94,.5),transparent)}
    .card::after{content:'';position:absolute;inset:0;background:radial-gradient(300px circle at 80% 20%,rgba(59,130,246,.05),transparent 60%);pointer-events:none}
    @keyframes cardIn{from{opacity:0;transform:translateY(20px)}}

    .card h1{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--white);margin-bottom:6px;position:relative;z-index:1;transition:all .3s var(--ease)}
    .hint{color:var(--text-secondary);font-weight:500;font-size:15px;margin-bottom:24px;position:relative;z-index:1;transition:all .3s var(--ease)}

    /* Toggle */
    .role-toggle{position:relative;display:flex;margin-bottom:24px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.02);padding:4px;width:fit-content;z-index:1}
    .role-toggle .slider{position:absolute;top:4px;left:4px;width:calc(50% - 4px);height:calc(100% - 8px);border-radius:11px;background:linear-gradient(135deg,var(--blue),var(--green));box-shadow:0 0 20px var(--blue-glow);transition:transform .4s var(--ease);z-index:0}
    .role-toggle.indep .slider{transform:translateX(100%)}
    .role-toggle button{position:relative;z-index:1;padding:10px 28px;border:none;background:transparent;color:var(--text-secondary);font-weight:700;font-size:14px;cursor:pointer;transition:color .3s ease;font-family:inherit;border-radius:11px}
    .role-toggle button.active{color:#050a14}

    /* Form */
    .formGrid{display:grid;gap:14px;position:relative;z-index:1}
    .inputWrap{position:relative}
    input[type="email"],input[type="password"],input[type="text"]{
      width:100%;padding:14px 18px;border-radius:14px;border:1px solid var(--border);
      background:rgba(255,255,255,.03);color:var(--white);font-size:15px;font-weight:500;
      font-family:inherit;transition:all .25s ease;
    }
    input:focus{outline:none;border-color:rgba(59,130,246,.4);box-shadow:0 0 0 4px rgba(59,130,246,.08);background:rgba(255,255,255,.05)}
    input::placeholder{color:rgba(122,133,153,.5)}
    .inputToggle{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      border:1px solid var(--border);background:rgba(255,255,255,.04);
      color:var(--text-secondary);border-radius:8px;padding:5px 10px;font-size:12px;
      font-weight:700;cursor:pointer;transition:all .2s ease;
    }
    .inputToggle:hover{border-color:var(--border-hover);background:rgba(255,255,255,.07);color:var(--white)}

    .formFooter{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .helper{color:var(--text-secondary);font-weight:500;font-size:13px}
    .helper a{color:var(--blue);transition:color .2s ease}
    .helper a:hover{color:var(--green)}

    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 24px;border-radius:14px;font-size:15px;font-weight:700;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);transition:all .25s var(--ease);cursor:pointer}
    .btn:hover{border-color:var(--border-hover);background:rgba(255,255,255,.07);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.25)}
    .btn:active{transform:translateY(0)}
    .btn-primary{background:var(--white);color:var(--bg);border-color:transparent;box-shadow:0 0 40px rgba(240,244,255,.08)}
    .btn-primary:hover{box-shadow:0 0 50px rgba(240,244,255,.14),0 8px 30px rgba(0,0,0,.2);background:#fff}

    .sideNote{
      margin-top:20px;padding:14px 18px;border-radius:14px;position:relative;z-index:1;
      border:1px solid rgba(59,130,246,.15);background:var(--blue-soft);
      color:#93c5fd;font-weight:600;font-size:14px;
      transition:all .4s var(--ease);
    }

    /* Content transition */
    .fade-content{transition:opacity .25s ease, transform .25s ease}
    .fade-content.switching{opacity:0;transform:translateY(6px)}
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="glow-orb blue"></div>
  <div class="glow-orb green"></div>

  <header class="nav">
    <a class="brand" href="index.html">
      <svg height="34" viewBox="0 0 260 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="260" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#22c55e"/>
            <stop offset="50%" stop-color="#06b6d4"/>
            <stop offset="100%" stop-color="#3b82f6"/>
          </linearGradient>
        </defs>
        <path d="M8 22a8 8 0 010-11.3l2.8-2.8a1 1 0 011.4 1.4L9.4 12.1a6 6 0 008.5 8.5l2.8-2.8a1 1 0 011.4 1.4l-2.8 2.8A8 8 0 018 22z" fill="url(#logoGrad)"/>
        <path d="M30 16a8 8 0 010 11.3l-2.8 2.8a1 1 0 01-1.4-1.4l2.8-2.8a6 6 0 00-8.5-8.5l-2.8 2.8a1 1 0 01-1.4-1.4l2.8-2.8A8 8 0 0130 16z" fill="url(#logoGrad)"/>
        <text x="42" y="28" font-family="'Space Grotesk','Inter',sans-serif" font-weight="700" font-size="26" fill="url(#logoGrad)" letter-spacing="1">FREELINKO</text>
      </svg>
    </a>
    <a class="nav-btn" href="index.html">&larr; Retour</a>
  </header>

  <section class="card">
    <div class="fade-content" id="fadeContent">
      <h1 id="pageTitle">Connexion client</h1>
      <p class="hint" id="pageHint">Retrouvez vos demandes, vos messages et vos livraisons.</p>
    </div>

    <div class="role-toggle" id="roleToggle">
      <div class="slider"></div>
      <button type="button" id="toggleClient" class="active" onclick="switchRole('client')">Client</button>
      <button type="button" id="toggleIndep" onclick="switchRole('independant')">Independant</button>
    </div>

    <form class="formGrid" id="loginForm">
      <input type="email" name="email" id="emailField" placeholder="Email" required />
      <div class="inputWrap">
        <input type="password" name="password" placeholder="Mot de passe" required />
        <button class="inputToggle" type="button" data-toggle-password>Afficher</button>
      </div>
      <div class="formFooter">
        <label class="helper"><input type="checkbox" name="remember" /> Se souvenir de moi</label>
        <span class="helper"><a href="inscription.html">Mot de passe oublie ?</a></span>
      </div>
      <div class="actions">
        <button class="btn btn-primary" type="submit">Se connecter</button>
        <a class="btn" href="inscription.html">Creer un compte</a>
      </div>
    </form>
    <div class="sideNote fade-content" id="sideNote">
      Connexion securisee — Vos projets, vos echanges, tout au meme endroit.
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://skfqoyyoahuaffshimnc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_yxLCOU94zhGck9yvGYch5Q_ePCPd9Yq";
    const supabaseClient = window.supabase?.createClient?.(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage }
    });

    let currentRole = "client";
    const fadeContent = document.getElementById("fadeContent");
    const sideNote = document.getElementById("sideNote");

    function switchRole(role){
      if (role === currentRole) return;
      currentRole = role;

      document.getElementById("toggleClient").classList.toggle("active", role === "client");
      document.getElementById("toggleIndep").classList.toggle("active", role === "independant");
      document.getElementById("roleToggle").classList.toggle("indep", role === "independant");

      // Animate content swap
      fadeContent.classList.add("switching");
      sideNote.classList.add("switching");

      setTimeout(function(){
        if (role === "client"){
          document.getElementById("pageTitle").textContent = "Connexion client";
          document.getElementById("pageHint").textContent = "Retrouvez vos demandes, vos messages et vos livraisons.";
          document.getElementById("emailField").placeholder = "Email";
          sideNote.textContent = "Connexion securisee — Vos projets, vos echanges, tout au meme endroit.";
          sideNote.style.borderColor = "rgba(59,130,246,.15)";
          sideNote.style.background = "rgba(59,130,246,.12)";
          sideNote.style.color = "#93c5fd";
        } else {
          document.getElementById("pageTitle").textContent = "Connexion independant";
          document.getElementById("pageHint").textContent = "Accedez a vos missions, a vos prix et a vos revenus.";
          document.getElementById("emailField").placeholder = "Email pro";
          sideNote.textContent = "Missions qualifiees — Negociation claire — Paiement securise.";
          sideNote.style.borderColor = "rgba(34,197,94,.15)";
          sideNote.style.background = "rgba(34,197,94,.12)";
          sideNote.style.color = "#86efac";
        }
        fadeContent.classList.remove("switching");
        sideNote.classList.remove("switching");
      }, 250);
    }

    const togglePassword = document.querySelector("[data-toggle-password]");
    const passwordField = document.querySelector("[name='password']");
    if (togglePassword && passwordField){
      togglePassword.addEventListener("click", function(){
        var isHidden = passwordField.type === "password";
        passwordField.type = isHidden ? "text" : "password";
        togglePassword.textContent = isHidden ? "Masquer" : "Afficher";
      });
    }

    async function redirectIfLoggedIn(){
      if (!supabaseClient) return;
      var res = await supabaseClient.auth.getSession();
      var session = res.data.session;
      if (session && session.user){
        var role = session.user.user_metadata?.role;
        if (role === "independant"){
          window.location.href = "indep-dashboard.html";
        } else {
          if (window.localStorage.getItem("freelinko-request-draft")){
            window.location.href = "request.html";
            return;
          }
          window.location.href = "dashboard.html";
        }
      }
    }
    redirectIfLoggedIn();

    var loginForm = document.getElementById("loginForm");
    if (loginForm){
      loginForm.addEventListener("submit", function(event){
        event.preventDefault();
        if (!supabaseClient){
          alert("Configurez Supabase pour activer la connexion.");
          return;
        }
        var formData = new FormData(loginForm);
        var email = formData.get("email").toString().trim();
        var password = formData.get("password").toString();
        supabaseClient.auth.signInWithPassword({ email: email, password: password })
          .then(async function(result){
            if (result.error){
              alert(result.error.message);
              return;
            }
            var role = result.data.user?.user_metadata?.role;
            if (currentRole === "client" && role && role !== "client"){
              await supabaseClient.auth.signOut();
              alert("Ce compte n'est pas un compte client.");
              return;
            }
            if (currentRole === "independant" && role && role !== "independant"){
              await supabaseClient.auth.signOut();
              alert("Ce compte n'est pas un compte independant.");
              return;
            }
            alert("Connexion reussie.");
            if (role === "independant"){
              window.location.href = "indep-dashboard.html";
            } else {
              if (window.localStorage.getItem("freelinko-request-draft")){
                window.location.href = "request.html";
                return;
              }
              window.location.href = "dashboard.html";
            }
          });
      });
    }
  </script>
</body>
</html>
